<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan de Entrenamiento · Hector</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Epilogue:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0e14;--surface:#111620;--surface2:#171d28;--border:#1e2736;
    --accent-water:#38bdf8;--accent-move:#a78bfa;--accent-rest:#34d399;
    --accent-warn:#fb923c;--accent-foot:#f472b6;
    --text:#e2e8f0;--text-muted:#64748b;--text-dim:#334155;
    --done-bg:#0f2d1a;--done-border:#166534;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Epilogue',sans-serif;font-weight:300;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(56,189,248,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  .wrapper{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:36px 16px 80px;}
  .header-label{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.2em;color:var(--accent-water);text-transform:uppercase;margin-bottom:10px;}
  h1{font-family:'Syne',sans-serif;font-size:clamp(26px,5vw,44px);font-weight:800;line-height:1.05;letter-spacing:-.02em;margin-bottom:20px;}
  h1 span{color:var(--accent-water);}
  .global-progress{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px 24px;margin-bottom:32px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;}
  .stat-item label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;color:var(--text-muted);text-transform:uppercase;display:block;margin-bottom:5px;}
  .stat-num{font-family:'Syne',sans-serif;font-size:26px;font-weight:700;}
  .stat-num span{font-size:13px;color:var(--text-muted);font-weight:400;}
  .progress-bar-wrap{grid-column:1/-1;margin-top:8px;}
  .progress-bar-wrap label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;color:var(--text-muted);text-transform:uppercase;display:flex;justify-content:space-between;margin-bottom:7px;}
  .bar-track{height:5px;background:var(--border);border-radius:99px;overflow:hidden;}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--accent-water),var(--accent-move));border-radius:99px;transition:width .6s cubic-bezier(.34,1.56,.64,1);width:0%;}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:28px;}
  .legend-item{display:flex;align-items:center;gap:7px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);}
  .legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .month-nav{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
  .month-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-muted);width:32px;height:32px;border-radius:8px;font-size:16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;}
  .month-btn:hover{border-color:var(--accent-water);color:var(--accent-water);}
  .month-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;}
  .month-add{margin-left:auto;background:transparent;border:1px dashed var(--border);color:var(--text-muted);padding:6px 14px;border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s;}
  .month-add:hover{border-color:var(--accent-rest);color:var(--accent-rest);}
  .week-block{margin-bottom:32px;}
  .week-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
  .week-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;}
  .week-pct{margin-left:auto;font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);}
  .week-pct strong{color:var(--accent-water);font-size:13px;}
  .day-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:border-color .2s;}
  .day-card:hover{border-color:#2a3a52;}
  .day-card.completed{border-color:var(--done-border);background:var(--done-bg);}
  .day-header{display:flex;align-items:center;padding:14px 18px;gap:12px;cursor:pointer;user-select:none;}
  .day-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);width:52px;flex-shrink:0;}
  .day-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;flex:1;}
  .day-tags{display:flex;gap:5px;flex-wrap:wrap;}
  .tag{font-family:'DM Mono',monospace;font-size:10px;padding:2px 7px;border-radius:99px;border:1px solid;}
  .tag-natacion{color:var(--accent-water);border-color:rgba(56,189,248,.3);background:rgba(56,189,248,.06);}
  .tag-eliptica{color:var(--accent-move);border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.06);}
  .tag-descanso{color:var(--accent-rest);border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.06);}
  .tag-hiit{color:var(--accent-warn);border-color:rgba(251,146,60,.3);background:rgba(251,146,60,.06);}
  .tag-futbol{color:var(--accent-foot);border-color:rgba(244,114,182,.3);background:rgba(244,114,182,.06);}
  .day-chevron{color:var(--text-muted);transition:transform .25s;font-size:16px;}
  .day-card.open .day-chevron{transform:rotate(180deg);}
  .day-content{display:none;padding:0 18px 18px;border-top:1px solid var(--border);}
  .day-card.open .day-content{display:block;}
  .session-block{padding-top:16px;}
  .session-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .session-label::after{content:'';flex:1;height:1px;background:var(--border);}
  .session-label.water{color:var(--accent-water);}
  .session-label.move{color:var(--accent-move);}
  .session-label.foot{color:var(--accent-foot);}
  .toggle-wrap{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface2);border-radius:10px;margin-bottom:12px;}
  .toggle-label{font-size:12px;color:var(--text-muted);flex:1;font-family:'DM Mono',monospace;letter-spacing:.05em;}
  .toggle-switch{position:relative;width:40px;height:22px;flex-shrink:0;}
  .toggle-switch input{opacity:0;width:0;height:0;position:absolute;}
  .toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:99px;cursor:pointer;transition:.2s;}
  .toggle-slider::before{content:'';position:absolute;width:16px;height:16px;left:3px;bottom:3px;background:var(--text-muted);border-radius:50%;transition:.2s;}
  .toggle-switch input:checked+.toggle-slider{background:rgba(167,139,250,.3);border:1px solid var(--accent-move);}
  .toggle-switch input:checked+.toggle-slider::before{transform:translateX(18px);background:var(--accent-move);}
  .panel{display:none;}
  .panel.active{display:block;}
  /* ALERT BANNER */
  .alert-banner{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(251,146,60,.08);border:1px solid rgba(251,146,60,.25);border-radius:10px;margin-bottom:12px;font-family:'DM Mono',monospace;font-size:11px;color:var(--accent-warn);line-height:1.5;}
  .alert-banner.info{background:rgba(56,189,248,.06);border-color:rgba(56,189,248,.2);color:var(--accent-water);}
  /* MONDAY VARIANT TOGGLE */
  .variant-tabs{display:flex;gap:8px;margin-bottom:14px;}
  .variant-btn{flex:1;padding:8px 10px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s;text-align:center;}
  .variant-btn.active{border-color:var(--accent-move);color:var(--accent-move);background:rgba(167,139,250,.08);}
  .swim-log{background:var(--surface2);border-radius:10px;padding:14px;}
  .swim-log-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
  .log-field label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--text-muted);text-transform:uppercase;display:block;margin-bottom:5px;}
  .log-field input,.log-field textarea{width:100%;background:var(--border);border:1px solid transparent;border-radius:7px;padding:8px 10px;color:var(--text);font-family:'Epilogue',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
  .log-field input:focus,.log-field textarea:focus{border-color:var(--accent-water);}
  .log-field textarea{resize:vertical;min-height:56px;}
  .log-field.full{grid-column:1/-1;}
  .save-log-btn{width:100%;padding:9px;border-radius:8px;border:1px solid var(--accent-water);background:rgba(56,189,248,.08);color:var(--accent-water);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;cursor:pointer;transition:all .2s;}
  .log-saved{display:none;font-family:'DM Mono',monospace;font-size:11px;color:var(--accent-rest);text-align:center;margin-top:8px;}
  .foot-log{background:var(--surface2);border-radius:10px;padding:14px;}
  .foot-log-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
  .exercise-list{list-style:none;display:flex;flex-direction:column;gap:7px;}
  .exercise-item{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;background:var(--surface2);border-radius:10px;border:1px solid transparent;cursor:pointer;transition:all .2s;}
  .exercise-item:hover{border-color:var(--border);}
  .exercise-item.done{background:rgba(74,222,128,.05);border-color:rgba(74,222,128,.15);}
  .exercise-item.done .ex-title{text-decoration:line-through;color:var(--text-muted);}
  .ex-check{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--text-dim);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:10px;}
  .exercise-item.done .ex-check{background:var(--accent-rest);border-color:var(--accent-rest);color:#0a0e14;}
  .ex-body{flex:1;}
  .ex-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;line-height:1.4;}
  .ex-detail{font-size:12px;color:var(--text-muted);line-height:1.5;}
  .ex-meta{display:flex;gap:8px;margin-top:5px;flex-wrap:wrap;}
  .ex-pill{font-family:'DM Mono',monospace;font-size:10px;padding:2px 7px;border-radius:99px;background:var(--border);color:var(--text-muted);}
  .ex-pill.z1{background:rgba(52,211,153,.1);color:var(--accent-rest);}
  .ex-pill.z2{background:rgba(56,189,248,.1);color:var(--accent-water);}
  .ex-pill.z3{background:rgba(251,146,60,.1);color:var(--accent-warn);}
  .ex-pill.z4{background:rgba(239,68,68,.1);color:#f87171;}
  .optional-badge{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent-rest);border:1px solid rgba(52,211,153,.3);padding:2px 8px;border-radius:99px;margin-left:auto;}
  .intensity-badge{font-family:'DM Mono',monospace;font-size:10px;padding:3px 9px;border-radius:99px;margin-left:8px;}
  .int-light{background:rgba(52,211,153,.1);color:var(--accent-rest);border:1px solid rgba(52,211,153,.2);}
  .int-mod{background:rgba(56,189,248,.1);color:var(--accent-water);border:1px solid rgba(56,189,248,.2);}
  .int-hard{background:rgba(251,146,60,.1);color:var(--accent-warn);border:1px solid rgba(251,146,60,.2);}
  .int-hiit{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2);}
  .mark-day-btn{margin-top:14px;width:100%;padding:9px;border-radius:9px;border:1px dashed var(--border);background:transparent;color:var(--text-muted);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;cursor:pointer;transition:all .2s;}
  .mark-day-btn:hover{border-color:var(--accent-rest);color:var(--accent-rest);}
  .day-card.completed .mark-day-btn{border-color:rgba(74,222,128,.3);color:var(--accent-rest);background:rgba(74,222,128,.05);}
  .rest-day-msg{padding:16px 0;text-align:center;font-size:13px;color:var(--text-muted);}
  .reset-btn{display:block;margin:36px auto 0;padding:9px 26px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;cursor:pointer;transition:all .2s;}
  .reset-btn:hover{border-color:#f87171;color:#f87171;}
  @media(max-width:520px){.global-progress{grid-template-columns:1fr 1fr;}.progress-bar-wrap{grid-column:1/-1;}.swim-log-grid,.foot-log-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrapper">
  <div class="header-label">Entrenamiento personal</div>
  <h1>Natación <span>+</span> Elíptica</h1>

  <div class="global-progress">
    <div class="stat-item"><label>Días completados</label><div class="stat-num" id="days-done">0 <span>/ —</span></div></div>
    <div class="stat-item"><label>Sesiones registradas</label><div class="stat-num" id="ex-done">0 <span>/ <span id="ex-total">—</span></span></div></div>
    <div class="stat-item"><label>Avance del mes</label><div class="stat-num" id="pct-done">0<span>%</span></div></div>
    <div class="progress-bar-wrap">
      <label><span>Progreso</span><span id="pct-label">0%</span></label>
      <div class="bar-track"><div class="bar-fill" id="main-bar"></div></div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent-water)"></div>Natación</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent-move)"></div>Elíptica</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent-foot)"></div>Fútbol</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent-rest)"></div>Opcional</div>
  </div>

  <div class="month-nav">
    <button class="month-btn" onclick="prevMonth()">‹</button>
    <span class="month-title" id="month-title">Mes 1</span>
    <button class="month-btn" onclick="nextMonth()">›</button>
    <button class="month-add" onclick="addMonth()">+ Agregar mes</button>
  </div>

  <div id="plan-container"></div>
  <button class="reset-btn" onclick="resetAll()">↺ Reiniciar progreso</button>
</div>

<script>
// ============================================================
// EXERCISE LIBRARY
// ============================================================

// MONDAY SESSIONS: two variants per week
// Variant A = fin de semana activo (más suave), Variant B = fin de semana de descanso (más intenso)
const MON_SESSIONS = {
  m1w1: {
    varA: { label:"Elíptica · 30 min · Zona 2 suave (fin de semana activo)", exercises:[
      {id:"m1w1d1A1", title:"Calentamiento – 5 min Zona 1", detail:"Resistencia 2. El cuerpo viene de un fin de semana activo. Arranque tranquilo.", meta:["5 min","Z1"]},
      {id:"m1w1d1A2", title:"Zona 2 continua – 20 min", detail:"Resistencia 4. Cadencia 62–65 rpm. Sin variaciones de intensidad. El volumen es menor que el de la variante B porque acumulaste carga el fin de semana.", meta:["20 min","Z2","Res. 4"]},
      {id:"m1w1d1A3", title:"Enfriamiento – 5 min Zona 1", detail:"Resistencia 2. Cadencia decreciente.", meta:["5 min","Z1"]}
    ]},
    varB: { label:"Elíptica · 35 min · Zona 2 base (fin de semana descansado)", exercises:[
      {id:"m1w1d1B1", title:"Calentamiento – 5 min Zona 1", detail:"Resistencia 2–3. Cadencia progresiva hasta 65 rpm.", meta:["5 min","Z1"]},
      {id:"m1w1d1B2", title:"Zona 2 continua – 25 min", detail:"Resistencia 4–5. Cadencia 65–70 rpm. Brazos activos en barras móviles. Empuja con el brazo contrario al pie que avanza.", meta:["25 min","Z2","Res. 4–5","60–70% FC"]},
      {id:"m1w1d1B3", title:"Enfriamiento – 5 min Zona 1", detail:"Resistencia 2. Cadencia decreciente.", meta:["5 min","Z1"]}
    ]}
  },
  m1w2: {
    varA: { label:"Elíptica · 30 min · Intervalos suaves (fin de semana activo)", exercises:[
      {id:"m1w2d1A1", title:"Calentamiento – 5 min Zona 1", detail:"Resistencia 2.", meta:["5 min","Z1"]},
      {id:"m1w2d1A2", title:"Bloques suaves – 4 × (3 min Z2 + 2 min Z1)", detail:"Z2: resistencia 4, cadencia 65 rpm. Z1: resistencia 2. Versión reducida de los intervalos: solo 4 rondas y con recuperación completa en Z1 entre bloques.", meta:["4 rondas","Z2→Z1","20 min"]},
      {id:"m1w2d1A3", title:"Enfriamiento – 5 min Zona 1", detail:"Resistencia 2.", meta:["5 min","Z1"]}
    ]},
    varB: { label:"Elíptica · 40 min · Intervalos Z2–Z3 (fin de semana descansado)", exercises:[
      {id:"m1w2d1B1", title:"Calentamiento – 5 min Zona 1", detail:"Resistencia 2–3. Cadencia creciente.", meta:["5 min","Z1"]},
      {id:"m1w2d1B2", title:"Bloques alternados – 5 × (3 min Z2 + 2 min Z3)", detail:"Z2: resistencia 4–5. Z3: sube resistencia a 6–7, misma cadencia 65 rpm. En Z3 la conversación es posible solo con frases cortas.", meta:["5 rondas","Z2→Z3","25 min"]},
      {id:"m1w2d1B3", title:"Enfriamiento – 5 min Zona 1", detail:"Resistencia 2.", meta:["5 min","Z1"]}
    ]}
  },
  m1w3: {
    varA: { label:"Elíptica · 30 min · Zona 2 con pedaleo invertido (fin de semana activo)", exercises:[
      {id:"m1w3d1A1", title:"Calentamiento – 5 min Zona 1", detail:"Resistencia 2.", meta:["5 min","Z1"]},
      {id:"m1w3d1A2", title:"Pedaleo adelante – 12 min Z2", detail:"Resistencia 4. Cadencia 65 rpm.", meta:["12 min","Z2"]},
      {id:"m1w3d1A3", title:"Pedaleo invertido – 8 min Z2", detail:"Resistencia 3. Marcha atrás. Activa cadena posterior.", meta:["8 min","Z2","Invertido"]},
      {id:"m1w3d1A4", title:"Enfriamiento – 5 min Zona 1", detail:"Resistencia 2.", meta:["5 min","Z1"]}
    ]},
    varB: { label:"Elíptica · 30 min · HIIT 30/30 (fin de semana descansado)", exercises:[
      {id:"m1w3d1B1", title:"Calentamiento – 5 min Zona 1", detail:"Resistencia 2–3. Cadencia progresiva. Calentamiento imprescindible antes del HIIT.", meta:["5 min","Z1"]},
      {id:"m1w3d1B2", title:"HIIT 30/30 – 10 rondas", detail:"30 seg a resistencia 9–10 (Z4: no puedes hablar). 30 seg a resistencia 2 (Z1: recuperación). 10 repeticiones. Empuja con fuerza brazos y piernas en los 30 seg de esfuerzo.", meta:["10 rondas","30s Z4 / 30s Z1","10 min"]},
      {id:"m1w3d1B3", title:"Zona 2 de transición – 5 min", detail:"Resistencia 4. Metaboliza el lactato generado.", meta:["5 min","Z2"]},
      {id:"m1w3d1B4", title:"Enfriamiento – 5 min Zona 1", detail:"Resistencia 2.", meta:["5 min","Z1"]}
    ]}
  },
  m1w4: {
    varA: { label:"Elíptica · 35 min · Escalera media (fin de semana activo)", exercises:[
      {id:"m1w4d1A1", title:"Calentamiento – 5 min Zona 1", detail:"Resistencia 2.", meta:["5 min","Z1"]},
      {id:"m1w4d1A2", title:"Escalera – 4 × 5 min", detail:"Res. 4 → 5 → 6 → 7. Cadencia 65 rpm. Versión reducida de la escalera completa.", meta:["4×5 min","Res. 4→7","Z2→Z3"]},
      {id:"m1w4d1A3", title:"Enfriamiento – 5 min Zona 1", detail:"Resistencia 2.", meta:["5 min","Z1"]}
    ]},
    varB: { label:"Elíptica · 40 min · Escalera completa (fin de semana descansado)", exercises:[
      {id:"m1w4d1B1", title:"Calentamiento – 5 min Zona 1", detail:"Resistencia 2–3.", meta:["5 min","Z1"]},
      {id:"m1w4d1B2", title:"Escalera ascendente – 6 × 5 min", detail:"Res. 4→5→6→7→8→9. Cadencia constante 65 rpm. El último bloque debe sentirse duro pero sostenible.", meta:["6×5 min","Res. 4→9","Z2→Z4"]},
      {id:"m1w4d1B3", title:"Enfriamiento – 5 min Zona 1", detail:"Resistencia 2.", meta:["5 min","Z1"]}
    ]}
  }
};

// THURSDAY ELLIPTICAL (when no football)
const THU_ELL = {
  m1w1: { label:"Elíptica · 35 min · Intervalos suaves", exercises:[
    {id:"m1w1d4e1", title:"Calentamiento – 5 min Zona 1", detail:"Resistencia 2–3.", meta:["5 min","Z1"]},
    {id:"m1w1d4e2", title:"Bloques alternados – 5 × (3 min Z2 + 2 min Z3)", detail:"Z2: resistencia 4–5, cadencia 65 rpm. Z3: resistencia 6–7, misma cadencia.", meta:["5 rondas","Z2→Z3","25 min"]},
    {id:"m1w1d4e3", title:"Enfriamiento – 5 min Zona 1", detail:"Resistencia 2.", meta:["5 min","Z1"]}
  ]},
  m1w2: { label:"Elíptica · 40 min · Zona 2 con picos Z4", exercises:[
    {id:"m1w2d4e1", title:"Calentamiento – 5 min Zona 1", detail:"Resistencia 2–3.", meta:["5 min","Z1"]},
    {id:"m1w2d4e2", title:"Zona 2 – 20 min", detail:"Resistencia 5. Cadencia 65–70 rpm.", meta:["20 min","Z2","Res. 5"]},
    {id:"m1w2d4e3", title:"3 picos Z4 – 3 × (2 min Z4 + 2 min Z1)", detail:"Resistencia 8–9 por 2 min. Luego resistencia 2 por 2 min de recuperación.", meta:["3×2 min","Z4→Z1"]},
    {id:"m1w2d4e4", title:"Enfriamiento – 3 min Zona 1", detail:"Resistencia 2.", meta:["3 min","Z1"]}
  ]},

}
function zoneClass(z){if(!z)return '';const m=z.match(/Z(\d)/);return m?(['','z1','z2','z3','z4'][+m[1]]||''):'';}
function intBadge(i){const map={light:['int-light','Suave'],mod:['int-mod','Moderado'],hard:['int-hard','Intenso'],hiit:['int-hiit','HIIT']};const[cls,label]=map[i]||[];return cls?`<span class="intensity-badge ${cls}">${label}</span>`:'';}
function exHTML(ex){
  const done=state[ex.id]?' done':'';const check=state[ex.id]?'✓':'';
  const pills=(ex.meta||[]).map(m=>`<span class="ex-pill ${zoneClass(m)}">${m}</span>`).join('');
  return `<li class="exercise-item${done}" onclick="toggleEx('${ex.id}')" data-exid="${ex.id}"><div class="ex-check">${check}</div><div class="ex-body"><div class="ex-title">${ex.title}</div><div class="ex-detail">${ex.detail}</div><div class="ex-meta">${pills}</div></div></li>`;
}
function exListHTML(exercises){return `<ul class="exercise-list">${exercises.map(exHTML).join('')}</ul>`;}

// ============================================================
// SWIM LOG
// ============================================================
function swimLogHTML(dayId){
  const s=state[`swim_${dayId}`]||{};const hasSaved=Object.keys(s).length>0;
  return `<div class="swim-log"><div class="swim-log-grid">
    <div class="log-field"><label>⏱ Duración</label><input type="text" placeholder="ej. 45 min" value="${s.duration||''}" oninput="saveSwimLog('${dayId}','duration',this.value)"></div>
    <div class="log-field"><label>🔥 Calorías</label><input type="text" placeholder="ej. 320 kcal" value="${s.calories||''}" oninput="saveSwimLog('${dayId}','calories',this.value)"></div>
    <div class="log-field"><label>💪 Brazadas</label><input type="text" placeholder="ej. 1240" value="${s.strokes||''}" oninput="saveSwimLog('${dayId}','strokes',this.value)"></div>
    <div class="log-field"><label>❤️ FC Promedio</label><input type="text" placeholder="ej. 142 bpm" value="${s.hr||''}" oninput="saveSwimLog('${dayId}','hr',this.value)"></div>
    <div class="log-field full"><label>📝 Notas del entrenador</label><textarea placeholder="Series, observaciones técnicas..." oninput="saveSwimLog('${dayId}','notes',this.value)">${s.notes||''}</textarea></div>
  </div><div class="log-saved" id="swimsaved_${dayId}" style="${hasSaved?'display:block':''}">✓ Registro guardado</div></div>`;
}
function saveSwimLog(dayId,field,value){if(!state[`swim_${dayId}`])state[`swim_${dayId}`]={};state[`swim_${dayId}`][field]=value;saveState();const el=document.getElementById(`swimsaved_${dayId}`);if(el)el.style.display='block';}

// ============================================================
// FOOTBALL LOG
// ============================================================
function footballLogHTML(dayId){
  const s=state[`foot_${dayId}`]||{};const hasSaved=Object.keys(s).length>0;
  return `<div class="foot-log"><div class="foot-log-grid">
    <div class="log-field"><label>⏱ Duración</label><input type="text" placeholder="ej. 60 min" value="${s.duration||''}" oninput="saveFootLog('${dayId}','duration',this.value)"></div>
    <div class="log-field"><label>🔥 Calorías</label><input type="text" placeholder="ej. 480 kcal" value="${s.calories||''}" oninput="saveFootLog('${dayId}','calories',this.value)"></div>
    <div class="log-field full"><label>❤️ FC Promedio</label><input type="text" placeholder="ej. 158 bpm" value="${s.hr||''}" oninput="saveFootLog('${dayId}','hr',this.value)"></div>
    <div class="log-field full"><label>📝 Notas del partido</label><textarea placeholder="Resultado, posición, observaciones..." oninput="saveFootLog('${dayId}','notes',this.value)">${s.notes||''}</textarea></div>
  </div><div class="log-saved" id="footsaved_${dayId}" style="${hasSaved?'display:block':''}">✓ Registro guardado</div></div>`;
}
function saveFootLog(dayId,field,value){if(!state[`foot_${dayId}`])state[`foot_${dayId}`]={};state[`foot_${dayId}`][field]=value;saveState();const el=document.getElementById(`footsaved_${dayId}`);if(el)el.style.display='block';}

// ============================================================
// THURSDAY BLOCK
// ============================================================
function thursdayBlockHTML(day){
  const dayId=day.id;const wk=day.weekKey;
  const isFootball=state[`thu_football_${dayId}`]===true;
  const ellData=THU_ELL[wk]||null;
  return `<div class="session-block">
    <div class="session-label" style="color:var(--text-muted)">Jueves · elige tu actividad</div>
    <div class="toggle-wrap">
      <span class="toggle-label">Hoy juego fútbol</span>
      <label class="toggle-switch"><input type="checkbox" ${isFootball?'checked':''} onchange="toggleThursday('${dayId}',this.checked)"><span class="toggle-slider"></span></label>
    </div>
    <div class="panel ${isFootball?'active':''}" id="panel_foot_${dayId}">
      <div class="session-label foot">Fútbol · Registro del partido</div>
      ${footballLogHTML(dayId)}
    </div>
    <div class="panel ${!isFootball?'active':''}" id="panel_ell_${dayId}">
      ${ellData?`<div class="session-label move">${ellData.label}</div>${exListHTML(ellData.exercises)}`:'<div class="rest-day-msg">Sin sesión asignada para este jueves</div>'}
    </div>
  </div>`;
}
function toggleThursday(dayId,isFootball){
  state[`thu_football_${dayId}`]=isFootball;saveState();
  document.getElementById(`panel_foot_${dayId}`).className=`panel ${isFootball?'active':''}`;
  document.getElementById(`panel_ell_${dayId}`).className=`panel ${!isFootball?'active':''}`;
  updateStats();updateWeekPcts();
}

// ============================================================
// MONDAY BLOCK (two variants)
// ============================================================
function mondayBlockHTML(day){
  const dayId=day.id;const wk=day.weekKey;
  const variantKey=`mon_variant_${dayId}`;
  const chosen=state[variantKey]||'B';
  // Get data from the right library
  const lib=wk.startsWith('m2')?M2_MON:MON_SESSIONS;
  const data=lib[wk];
  if(!data) return '<div class="rest-day-msg">Sesión en preparación</div>';
  const sA=data.varA;const sB=data.varB;
  return `<div class="session-block">
    <div class="session-label move">Lunes · elige según tu fin de semana</div>
    <div class="variant-tabs">
      <button class="variant-btn ${chosen==='A'?'active':''}" onclick="chooseVariant('${dayId}','A')">Fin de semana activo</button>
      <button class="variant-btn ${chosen==='B'?'active':''}" onclick="chooseVariant('${dayId}','B')">Fin de semana descansado</button>
    </div>
    <div class="alert-banner info" id="mon_hint_${dayId}" style="${chosen==='A'?'':'display:none'}">
      Carga reducida — acumulaste entrenamiento el fin de semana.
    </div>
    <div class="panel ${chosen==='A'?'active':''}" id="mon_panA_${dayId}">
      <div class="session-label move">${sA.label}</div>${exListHTML(sA.exercises)}
    </div>
    <div class="panel ${chosen==='B'?'active':''}" id="mon_panB_${dayId}">
      <div class="session-label move">${sB.label}</div>${exListHTML(sB.exercises)}
    </div>
  </div>`;
}
function chooseVariant(dayId,v){
  state[`mon_variant_${dayId}`]=v;saveState();
  ['A','B'].forEach(x=>{
    document.getElementById(`mon_pan${x}_${dayId}`).className=`panel ${x===v?'active':''}`;
    const btn=document.querySelector(`[onclick="chooseVariant('${dayId}','${x}')"]`);
    if(btn)btn.className=`variant-btn ${x===v?'active':''}`;
  });
  const hint=document.getElementById(`mon_hint_${dayId}`);
  if(hint)hint.style.display=v==='A'?'':'none';
  updateStats();updateWeekPcts();
}

// ============================================================
// FRIDAY BLOCK (auto-detects thursday football)
// ============================================================
function fridayPostSwimHTML(day){
  // Find the thursday id for this week
  const wk=day.weekKey;
  const month=MONTHS[currentMonth];
  let thuId=null;
  month.weeks.forEach(w=>{w.days.forEach(d=>{if(d.weekKey===wk&&d.isThursday)thuId=d.id;});});
  const hadFootball=thuId&&state[`thu_football_${thuId}`]===true;
  const lib=wk.startsWith('m2')?null:FRI_REGULAR;
  const regularData=lib?lib[wk]:null;

  if(hadFootball){
    return `
      <div class="alert-banner">⚠ Jugaste fútbol ayer — elíptica reducida a 15 min de descarga.</div>
      <div class="session-label move">${FRI_POST_FOOT.label}</div>
      ${exListHTML(FRI_POST_FOOT.exercises)}`;
  }
  if(regularData){
    return `<div class="session-label move">${regularData.label}</div>${exListHTML(regularData.exercises)}`;
  }
  // M2 fallback
  return `<div class="session-label move">Elíptica post-natación · 20 min · Z1</div>
    ${exListHTML([{id:`${day.id}_fri1`,title:"Zona 1 – 20 min",detail:"Resistencia 3. Cadencia 60 rpm.",meta:["20 min","Z1"]}])}`;
}

// ============================================================
// WEEKEND OPTIONAL
// ============================================================
function weekendOptHTML(day,type){
  const optKey=`opt_${day.id}_${type}`;
  const isActive=state[optKey]===true;
  const data=WEEKEND_OPT[type];
  return `<div class="session-block">
    <div class="toggle-wrap">
      <span class="toggle-label" style="color:var(--accent-rest)">Realizar elíptica hoy</span>
      <label class="toggle-switch"><input type="checkbox" ${isActive?'checked':''} onchange="toggleOpt('${optKey}','opt_panel_${day.id}_${type}',this.checked)"><span class="toggle-slider"></span></label>
    </div>
    <div class="panel ${isActive?'active':''}" id="opt_panel_${day.id}_${type}">
      <div class="session-label move">${data.label}</div>${exListHTML(data.exercises)}
    </div>
  </div>`;
}
function toggleOpt(key,panelId,val){
  state[key]=val;saveState();
  document.getElementById(panelId).className=`panel ${val?'active':''}`;
  updateStats();updateWeekPcts();
}

// ============================================================
// BUILD DAY CONTENT
// ============================================================
function buildDayContent(day){
  const wk=day.weekKey;
  const tueSrc=TUE_SESSIONS[wk];
  const wedSrc=WED_POST[wk];
  let html='';

  if(day.isMonday){
    html+=mondayBlockHTML(day);
  } else if(day.isThursday){
    html+=thursdayBlockHTML(day);
  } else if(day.isSwimDay && day.isFriday){
    html+=`<div class="session-block"><div class="session-label water">Natación con entrenador</div>${swimLogHTML(day.id)}</div>`;
    html+=`<div class="session-block">${fridayPostSwimHTML(day)}</div>`;
  } else if(day.isSwimDay && day.isSat){
    html+=`<div class="session-block"><div class="session-label water">Natación con entrenador</div>${swimLogHTML(day.id)}</div>`;
    html+=weekendOptHTML(day,'sat');
  } else if(day.isSun){
    html+=weekendOptHTML(day,'sun');
  } else if(day.isSwimDay){
    // Wednesday
    html+=`<div class="session-block"><div class="session-label water">Natación con entrenador</div>${swimLogHTML(day.id)}</div>`;
    if(wedSrc){html+=`<div class="session-block"><div class="session-label move">${wedSrc.label}</div>${exListHTML(wedSrc.exercises)}</div>`;}
    else{html+=`<div class="session-block"><div class="session-label move">Elíptica post-natación · 20 min</div>${exListHTML([{id:`${day.id}_we1`,title:"Zona 1–2 – 20 min",detail:"Resistencia 4. Cadencia 62 rpm.",meta:["20 min","Z1–Z2"]}])}</div>`;}
  } else if(tueSrc){
    html+=`<div class="session-block"><div class="session-label move">${tueSrc.label}</div>${exListHTML(tueSrc.exercises)}</div>`;
  } else {
    html+=`<div class="rest-day-msg">Sesión en preparación para el Mes 2</div>`;
  }
  return html;
}

// ============================================================
// GET EXERCISE IDs FOR STATS
// ============================================================
function getDayExIds(day){
  const wk=day.weekKey;
  const lib=wk.startsWith('m2')?M2_MON:MON_SESSIONS;
  let ids=[];
  if(day.isMonday){
    const chosen=state[`mon_variant_${day.id}`]||'B';
    const data=lib[wk];
    if(data){const v=chosen==='A'?data.varA:data.varB;ids=v.exercises.map(e=>e.id);}
  } else if(day.isThursday){
    const isFootball=state[`thu_football_${day.id}`]===true;
    if(isFootball){ids=[];}
    else{const ell=THU_ELL[wk];if(ell)ids=ell.exercises.map(e=>e.id);}
  } else if(day.isSwimDay && day.isFriday){
    const month=MONTHS[currentMonth];let thuId=null;
    month.weeks.forEach(w=>{w.days.forEach(d=>{if(d.weekKey===wk&&d.isThursday)thuId=d.id;});});
    const hadFoot=thuId&&state[`thu_football_${thuId}`]===true;
    ids=hadFoot?FRI_POST_FOOT.exercises.map(e=>e.id):(FRI_REGULAR[wk]?FRI_REGULAR[wk].exercises.map(e=>e.id):[]);
  } else if(day.isSat){
    const optKey=`opt_${day.id}_sat`;
    if(state[optKey])ids=WEEKEND_OPT.sat.exercises.map(e=>e.id);
  } else if(day.isSun){
    const optKey=`opt_${day.id}_sun`;
    if(state[optKey])ids=WEEKEND_OPT.sun.exercises.map(e=>e.id);
  } else if(day.isSwimDay){
    const wd=WED_POST[wk];if(wd)ids=wd.exercises.map(e=>e.id);
  } else {
    const ts=TUE_SESSIONS[wk];if(ts)ids=ts.exercises.map(e=>e.id);
  }
  return ids;
}

// ============================================================
// RENDER DAY
// ============================================================
function dayHTML(day,wIdx,dIdx){
  const ids=getDayExIds(day);
  const dayDone=ids.length>0&&ids.every(id=>state[id]);
  return `<div class="day-card${dayDone?' completed':''}" id="card-${day.id}">
    <div class="day-header" onclick="toggleDay('${day.id}')">
      <span class="day-num">S${wIdx+1}·D${dIdx+1}</span>
      <span class="day-name">${day.name}${intBadge(day.intensity)}</span>
      <div class="day-tags">${day.tags.map(tagHTML).join('')}${day.isWeekend?'<span class="optional-badge">Opcional</span>':''}</div>
      <span class="day-chevron">⌄</span>
    </div>
    <div class="day-content">
      ${buildDayContent(day)}
      <button class="mark-day-btn" onclick="markDay('${day.id}',event)">${dayDone?'✓ Día completado':'○ Marcar día como completado'}</button>
    </div>
  </div>`;
}

// ============================================================
// RENDER WEEK / MONTH
// ============================================================
function weekHTML(week,wIdx){
  const ids=week.days.flatMap(d=>getDayExIds(d));
  const done=ids.filter(id=>state[id]).length;
  const pct=ids.length?Math.round(done/ids.length*100):0;
  return `<div class="week-block" id="week-${wIdx}">
    <div class="week-header">
      <span class="week-title">${week.label}</span>
      <span class="week-pct" id="wpct-${wIdx}"><strong>${pct}%</strong> completado</span>
    </div>
    ${week.days.map((d,di)=>dayHTML(d,wIdx,di)).join('')}
  </div>`;
}

function render(){
  const month=MONTHS[currentMonth];
  document.getElementById('month-title').textContent=month.label;
  document.getElementById('plan-container').innerHTML=month.weeks.map((w,i)=>weekHTML(w,i)).join('');
  updateStats();
}

// ============================================================
// INTERACTIONS
// ============================================================
function toggleDay(dayId){document.getElementById('card-'+dayId).classList.toggle('open');}

function toggleEx(exId){
  state[exId]=!state[exId];saveState();
  const item=document.querySelector(`[data-exid="${exId}"]`);
  if(!item)return;
  item.classList.toggle('done',state[exId]);
  item.querySelector('.ex-check').textContent=state[exId]?'✓':'';
  const dayContent=item.closest('.day-content');
  if(dayContent){
    const card=dayContent.closest('.day-card');
    const all=dayContent.querySelectorAll('.exercise-item');
    const done=dayContent.querySelectorAll('.exercise-item.done');
    const allDone=all.length>0&&all.length===done.length;
    card.classList.toggle('completed',allDone);
    const btn=dayContent.querySelector('.mark-day-btn');
    if(btn)btn.textContent=allDone?'✓ Día completado':'○ Marcar día como completado';
  }
  updateStats();updateWeekPcts();
}

function markDay(dayId,e){
  e.stopPropagation();
  const month=MONTHS[currentMonth];
  const day=month.weeks.flatMap(w=>w.days).find(d=>d.id===dayId);
  if(!day)return;
  const ids=getDayExIds(day);
  const allDone=ids.every(id=>state[id]);
  ids.forEach(id=>{state[id]=!allDone;});
  saveState();render();
}

function updateStats(){
  const month=MONTHS[currentMonth];
  const allDays=month.weeks.flatMap(w=>w.days);
  const allIds=allDays.flatMap(d=>getDayExIds(d));
  const doneDays=allDays.filter(d=>{const ids=getDayExIds(d);return ids.length>0&&ids.every(id=>state[id]);}).length;
  const doneEx=allIds.filter(id=>state[id]).length;
  const pct=allIds.length?Math.round(doneEx/allIds.length*100):0;
  document.getElementById('days-done').innerHTML=`${doneDays} <span>/ ${allDays.length}</span>`;
  document.getElementById('ex-done').innerHTML=`${doneEx} <span>/ <span id="ex-total">${allIds.length}</span></span>`;
  document.getElementById('pct-done').innerHTML=`${pct}<span>%</span>`;
  document.getElementById('main-bar').style.width=pct+'%';
  document.getElementById('pct-label').textContent=pct+'%';
}

function updateWeekPcts(){
  const month=MONTHS[currentMonth];
  month.weeks.forEach((w,i)=>{
    const ids=w.days.flatMap(d=>getDayExIds(d));
    const done=ids.filter(id=>state[id]).length;
    const pct=ids.length?Math.round(done/ids.length*100):0;
    const el=document.getElementById(`wpct-${i}`);
    if(el)el.innerHTML=`<strong>${pct}%</strong> completado`;
  });
}

function prevMonth(){if(currentMonth>0){currentMonth--;render();}}
function nextMonth(){if(currentMonth<MONTHS.length-1){currentMonth++;render();}}
function addMonth(){
  const n=MONTHS.length+1;
  MONTHS.push({month:n,label:`Mes ${n} · Por planificar`,weeks:[]});
  currentMonth=MONTHS.length-1;
  document.getElementById('month-title').textContent=MONTHS[currentMonth].label;
  document.getElementById('plan-container').innerHTML=`<div style="text-align:center;padding:40px;color:var(--text-muted);font-family:'DM Mono',monospace;font-size:13px;">Mes ${n} en preparación.<br>Solicita el plan a tu asistente.</div>`;
  updateStats();
}
function resetAll(){if(!confirm('¿Reiniciar todo el progreso?'))return;state={};saveState();render();}

render();
</script>
</body>
</html>
