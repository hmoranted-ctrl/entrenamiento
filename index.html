<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan de Entrenamiento · Natación + Elíptica</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Epilogue:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --surface: #111620;
    --surface2: #171d28;
    --border: #1e2736;
    --accent-water: #38bdf8;
    --accent-move: #a78bfa;
    --accent-rest: #34d399;
    --accent-warn: #fb923c;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #334155;
    --done-bg: #0f2d1a;
    --done-border: #166534;
    --done-text: #4ade80;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Epilogue', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* HEADER */
  header {
    margin-bottom: 48px;
  }

  .header-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent-water);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
  }

  h1 span {
    color: var(--accent-water);
  }

  /* PROGRESS GLOBAL */
  .global-progress {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 28px;
    margin-bottom: 40px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 24px;
  }

  .stat-item label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    display: block;
    margin-bottom: 6px;
  }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
  }

  .stat-num span {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .progress-bar-wrap {
    margin-top: 20px;
    grid-column: 1 / -1;
  }

  .progress-bar-wrap label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .bar-track {
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-water), var(--accent-move));
    border-radius: 99px;
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    width: 0%;
  }

  /* LEYENDA */
  .legend {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* SEMANAS */
  .week-block {
    margin-bottom: 40px;
  }

  .week-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .week-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
  }

  .week-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    background: var(--surface2);
    padding: 3px 10px;
    border-radius: 99px;
    border: 1px solid var(--border);
  }

  .week-progress-inline {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  .week-progress-inline strong {
    color: var(--accent-water);
    font-size: 14px;
  }

  /* DÍAS */
  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .day-card:hover {
    border-color: #2a3a52;
  }

  .day-card.completed {
    border-color: var(--done-border);
    background: var(--done-bg);
  }

  .day-header {
    display: flex;
    align-items: center;
    padding: 16px 20px;
    gap: 14px;
    cursor: pointer;
    user-select: none;
  }

  .day-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    width: 60px;
    flex-shrink: 0;
  }

  .day-name {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 600;
    flex: 1;
  }

  .day-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 99px;
    border: 1px solid;
    letter-spacing: 0.05em;
  }

  .tag-natacion { color: var(--accent-water); border-color: rgba(56,189,248,0.3); background: rgba(56,189,248,0.06); }
  .tag-eliptica { color: var(--accent-move); border-color: rgba(167,139,250,0.3); background: rgba(167,139,250,0.06); }
  .tag-descanso { color: var(--accent-rest); border-color: rgba(52,211,153,0.3); background: rgba(52,211,153,0.06); }
  .tag-hiit { color: var(--accent-warn); border-color: rgba(251,146,60,0.3); background: rgba(251,146,60,0.06); }

  .day-chevron {
    color: var(--text-muted);
    transition: transform 0.25s;
    font-size: 18px;
    line-height: 1;
  }

  .day-card.open .day-chevron { transform: rotate(180deg); }

  /* CONTENIDO EXPANDIDO */
  .day-content {
    display: none;
    padding: 0 20px 20px;
    border-top: 1px solid var(--border);
  }

  .day-card.open .day-content { display: block; }

  .session-block {
    padding-top: 18px;
  }

  .session-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .session-label.water { color: var(--accent-water); }
  .session-label.move { color: var(--accent-move); }

  .session-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* EJERCICIOS */
  .exercise-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }

  .exercise-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 14px;
    background: var(--surface2);
    border-radius: 10px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
  }

  .exercise-item:hover {
    border-color: var(--border);
  }

  .exercise-item.done {
    background: rgba(74,222,128,0.05);
    border-color: rgba(74,222,128,0.15);
  }

  .exercise-item.done .ex-title {
    text-decoration: line-through;
    color: var(--text-muted);
  }

  .ex-check {
    width: 18px; height: 18px;
    border-radius: 5px;
    border: 1.5px solid var(--text-dim);
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-size: 11px;
  }

  .exercise-item.done .ex-check {
    background: var(--accent-rest);
    border-color: var(--accent-rest);
    color: #0a0e14;
  }

  .ex-body { flex: 1; }

  .ex-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.4;
    transition: color 0.2s;
  }

  .ex-detail {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
    font-weight: 300;
  }

  .ex-meta {
    display: flex;
    gap: 10px;
    margin-top: 6px;
    flex-wrap: wrap;
  }

  .ex-pill {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 99px;
    background: var(--border);
    color: var(--text-muted);
  }

  .ex-pill.z2 { background: rgba(56,189,248,0.1); color: var(--accent-water); }
  .ex-pill.z3 { background: rgba(251,146,60,0.1); color: var(--accent-warn); }
  .ex-pill.z4 { background: rgba(239,68,68,0.1); color: #f87171; }
  .ex-pill.z1 { background: rgba(52,211,153,0.1); color: var(--accent-rest); }

  /* BOTÓN MARCAR DÍA */
  .mark-day-btn {
    margin-top: 16px;
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1px dashed var(--border);
    background: transparent;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .mark-day-btn:hover {
    border-color: var(--accent-rest);
    color: var(--accent-rest);
  }

  .day-card.completed .mark-day-btn {
    border-color: rgba(74,222,128,0.3);
    color: var(--accent-rest);
    background: rgba(74,222,128,0.05);
  }

  /* RESET */
  .reset-btn {
    display: block;
    margin: 40px auto 0;
    padding: 10px 28px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:hover {
    border-color: #f87171;
    color: #f87171;
  }

  /* TOOLTIP zona */
  .zone-info {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .zi { font-family: 'DM Mono', monospace; font-size: 10px; }
  .zi span { color: var(--text-muted); }

  @media (max-width: 600px) {
    .global-progress { grid-template-columns: 1fr 1fr; }
    .progress-bar-wrap { grid-column: 1 / -1; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="header-label">Mesociclo I · 4 semanas</div>
    <h1>Natación <span>+</span><br>Elíptica</h1>
  </header>

  <!-- PROGRESO GLOBAL -->
  <div class="global-progress">
    <div class="stat-item">
      <label>Días completados</label>
      <div class="stat-num" id="days-done">0 <span>/ 28</span></div>
    </div>
    <div class="stat-item">
      <label>Ejercicios hechos</label>
      <div class="stat-num" id="ex-done">0 <span>/ <span id="ex-total">0</span></span></div>
    </div>
    <div class="stat-item">
      <label>Avance general</label>
      <div class="stat-num" id="pct-done">0<span>%</span></div>
    </div>
    <div class="progress-bar-wrap">
      <label><span>Progreso del mes</span><span id="pct-label">0%</span></label>
      <div class="bar-track"><div class="bar-fill" id="main-bar"></div></div>
    </div>
  </div>

  <!-- LEYENDA -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent-water)"></div>Natación</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent-move)"></div>Elíptica</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent-warn)"></div>HIIT</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent-rest)"></div>Descarga / Z1</div>
  </div>

  <div id="plan-container"></div>

  <button class="reset-btn" onclick="resetAll()">↺ Reiniciar progreso</button>

</div>

<script>
const PLAN = [
  // =========================================================
  // SEMANA 1 – BASE AERÓBICA
  // =========================================================
  {
    week: 1,
    weekTitle: "Semana 1",
    weekTag: "Base aeróbica · volumen moderado",
    days: [
      {
        id: "s1d1",
        dayName: "Lunes",
        tags: ["eliptica"],
        sessions: [
          {
            type: "move",
            label: "Elíptica · 35 min",
            exercises: [
              {
                id: "s1d1e1",
                title: "Calentamiento – 5 min en Zona 1",
                detail: "Resistencia nivel 2–3. Cadencia suave, entre 50–60 rpm. Permite que la frecuencia cardíaca suba de manera gradual. Brazos apoyados levemente en las barras, sin empujar.",
                meta: ["5 min", "Z1", "Res. 2–3"]
              },
              {
                id: "s1d1e2",
                title: "Zona 2 continua – 25 min",
                detail: "Resistencia nivel 4–5. Cadencia de 65–75 rpm. Deberías poder hablar con esfuerzo moderado pero no cantar. Mantén la espalda erguida, activa los brazos alternando con las piernas (derecha adelante = brazo izquierdo empuja). Esta coordinación cruzada fortalece el patrón motor útil en la brazada.",
                meta: ["25 min", "Z2", "Res. 4–5", "60–70% FCM"]
              },
              {
                id: "s1d1e3",
                title: "Enfriamiento – 5 min en Zona 1",
                detail: "Reduce resistencia a nivel 2 y disminuye cadencia paulatinamente. Lleva la respiración a ritmo normal antes de bajarte de la máquina.",
                meta: ["5 min", "Z1"]
              }
            ]
          }
        ]
      },
      {
        id: "s1d2",
        dayName: "Martes",
        tags: ["eliptica"],
        sessions: [
          {
            type: "move",
            label: "Elíptica · 35 min · Pedaleo invertido",
            exercises: [
              {
                id: "s1d2e1",
                title: "Calentamiento – 5 min en Zona 1 (marcha adelante)",
                detail: "Resistencia 2. Cadencia suave. Activa articulaciones de cadera y rodilla antes del cambio de dirección.",
                meta: ["5 min", "Z1"]
              },
              {
                id: "s1d2e2",
                title: "Zona 2 hacia adelante – 15 min",
                detail: "Resistencia 4–5. Cadencia estable 65–70 rpm. Concéntrate en empujar con el talón en la parte baja del movimiento, que activa más el glúteo mayor. Este músculo es clave en el pateo de natación.",
                meta: ["15 min", "Z2", "Res. 4–5"]
              },
              {
                id: "s1d2e3",
                title: "Pedaleo invertido – 10 min en Zona 2",
                detail: "Invierte la dirección del pedaleo (marcha atrás). Resistencia 3–4. Este movimiento activa con mayor énfasis el bíceps femoral y los gemelos, y además exige mayor atención del sistema nervioso. En natación, estos grupos son determinantes durante la fase de propulsión del pateo de crol. Mantén la postura erguida aunque se sienta diferente.",
                meta: ["10 min", "Z2", "Res. 3–4", "Invertido"]
              },
              {
                id: "s1d2e4",
                title: "Enfriamiento – 5 min en Zona 1",
                detail: "Vuelve a la marcha adelante, resistencia 2, cadencia muy baja. Respiración controlada.",
                meta: ["5 min", "Z1"]
              }
            ]
          }
        ]
      },
      {
        id: "s1d3",
        dayName: "Miércoles",
        tags: ["natacion", "eliptica"],
        sessions: [
          {
            type: "water",
            label: "Natación · Sesión técnica",
            exercises: [
              {
                id: "s1d3n1",
                title: "Entrada al agua y calentamiento – 100 m crol suave",
                detail: "Nada sin presión. El objetivo es que el cuerpo recuerde el patrón del movimiento. Respira cada 3 brazadas (bilateral).",
                meta: ["100 m", "Suave"]
              },
              {
                id: "s1d3n2",
                title: "Series cortas de técnica – 6 × 25 m con 30 seg de descanso",
                detail: "Cada 25 m concentra la atención en un aspecto técnico diferente: 1er y 2do largo: posición de la mano en el agua al entrar (dedos juntos, pulgar mirando hacia abajo). 3er y 4to largo: rotación del tronco al respirar (no levantar la cabeza, girarla). 5to y 6to largo: pateo constante y sin doblar excesivamente la rodilla. Descansa 30 segundos entre cada largo.",
                meta: ["6 × 25 m", "30 seg descanso"]
              },
              {
                id: "s1d3n3",
                title: "Vuelta a la calma – 50 m de nado libre a ritmo muy bajo",
                detail: "Sin presión de tiempo ni técnica. Solo flotar y mantener el movimiento.",
                meta: ["50 m", "Libre"]
              }
            ]
          },
          {
            type: "move",
            label: "Elíptica post-natación · 30 min",
            exercises: [
              {
                id: "s1d3e1",
                title: "Calentamiento – 5 min Zona 1",
                detail: "Después de la natación, el cuerpo ya está activo. El calentamiento aquí es más corto pero necesario para adaptar el sistema cardiovascular al movimiento terrestre.",
                meta: ["5 min", "Z1"]
              },
              {
                id: "s1d3e2",
                title: "Zona 2 continua – 20 min",
                detail: "Resistencia 4. Cadencia estable 65 rpm. Esta es una sesión de refuerzo aeróbico posterior a la natación. No busques sensaciones intensas; el objetivo es sumar volumen cardiovascular de manera controlada. Usa los brazos activamente.",
                meta: ["20 min", "Z2", "Res. 4"]
              },
              {
                id: "s1d3e3",
                title: "Enfriamiento – 5 min Zona 1",
                detail: "Resistencia 2, cadencia lenta. Estira suavemente al finalizar: cuádriceps, gemelos y hombros.",
                meta: ["5 min", "Z1"]
              }
            ]
          }
        ]
      },
      {
        id: "s1d4",
        dayName: "Jueves",
        tags: ["eliptica"],
        sessions: [
          {
            type: "move",
            label: "Elíptica · 35 min · Intervalos suaves",
            exercises: [
              {
                id: "s1d4e1",
                title: "Calentamiento – 5 min Zona 1",
                detail: "Resistencia 2–3. Cadencia suave hasta alcanzar el ritmo respiratorio de conversación.",
                meta: ["5 min", "Z1"]
              },
              {
                id: "s1d4e2",
                title: "Bloques alternados Z2–Z3 – 5 rondas × (3 min Z2 + 2 min Z3)",
                detail: "Resistencia en Z2: nivel 4–5. Resistencia en Z3: nivel 6–7. La cadencia no cambia (mantén 65–70 rpm); lo que varía es la resistencia. En Z3 la conversación se vuelve más difícil pero sigue siendo posible con frases cortas. Este contraste introduce al sistema cardiovascular a trabajo más exigente de manera progresiva.",
                meta: ["5 rondas", "Z2 → Z3", "25 min"]
              },
              {
                id: "s1d4e3",
                title: "Enfriamiento – 5 min Zona 1",
                detail: "Resistencia 2. Cadencia muy suave. Regula la respiración antes de bajar.",
                meta: ["5 min", "Z1"]
              }
            ]
          }
        ]
      },
      {
        id: "s1d5",
        dayName: "Viernes",
        tags: ["natacion", "eliptica"],
        sessions: [
          {
            type: "water",
            label: "Natación · Sesión de respiración y ritmo",
            exercises: [
              {
                id: "s1d5n1",
                title: "Calentamiento – 100 m crol continuo",
                detail: "Ritmo tranquilo. Respiración bilateral (cada 3 brazadas). Siente el deslizamiento del cuerpo en el agua.",
                meta: ["100 m", "Crol suave"]
              },
              {
                id: "s1d5n2",
                title: "Trabajo de pateo con tabla – 4 × 25 m",
                detail: "Sostén la tabla con ambas manos extendidas al frente. Solo actúan las piernas. El pateo debe venir de la cadera, no de la rodilla. Los pies permanecen relajados (tobillo flexible). Descansa 30 seg entre cada largo. Este ejercicio fortalece exactamente los grupos musculares que trabaja la elíptica en marcha atrás.",
                meta: ["4 × 25 m", "30 seg descanso", "Solo piernas"]
              },
              {
                id: "s1d5n3",
                title: "Series de nado completo – 4 × 50 m con 45 seg descanso",
                detail: "Nada cada 50 m a ritmo cómodo, sin apresurarte. Concéntrate en que cada brazada sea larga y que el cuerpo rote levemente al respirar. El descanso es de 45 segundos entre cada repetición.",
                meta: ["4 × 50 m", "45 seg descanso"]
              }
            ]
          },
          {
            type: "move",
            label: "Elíptica post-natación · 30 min",
            exercises: [
              {
                id: "s1d5e1",
                title: "Calentamiento – 5 min Zona 1",
                detail: "Resistencia 2. Cuerpo ya activo por la natación; el calentamiento sirve para ajustar la postura en la máquina.",
                meta: ["5 min", "Z1"]
              },
              {
                id: "s1d5e2",

// ============================================================
// ESTADO
// ============================================================
const STORAGE_KEY = 'training_plan_v1';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}

function saveState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

let state = loadState();

// ============================================================
// RENDER
// ============================================================
function tagHTML(t) {
  const map = {
    natacion: ['tag-natacion', 'Natación'],
    eliptica: ['tag-eliptica', 'Elíptica'],
    hiit: ['tag-hiit', 'HIIT'],
    descanso: ['tag-descanso', 'Descanso']
  };
  const [cls, label] = map[t] || ['tag-descanso', t];
  return `<span class="tag ${cls}">${label}</span>`;
}

function zoneClass(z) {
  if (!z) return '';
  const m = z.match(/Z(\d)/);
  if (!m) return '';
  return ['', 'z1', 'z2', 'z3', 'z4'][+m[1]] || '';
}

function exHTML(ex) {
  const done = state[ex.id] ? ' done' : '';
  const check = state[ex.id] ? '✓' : '';
  const pills = (ex.meta || []).map(m => `<span class="ex-pill ${zoneClass(m)}">${m}</span>`).join('');
  return `
    <li class="exercise-item${done}" onclick="toggleEx('${ex.id}')" data-exid="${ex.id}">
      <div class="ex-check">${check}</div>
      <div class="ex-body">
        <div class="ex-title">${ex.title}</div>
        <div class="ex-detail">${ex.detail}</div>
        <div class="ex-meta">${pills}</div>
      </div>
    </li>`;
}

function sessionHTML(session) {
  return `
    <div class="session-block">
      <div class="session-label ${session.type}">${session.label}</div>
      <ul class="exercise-list">
        ${session.exercises.map(exHTML).join('')}
      </ul>
    </div>`;
}

function dayHTML(day, weekIdx, dayIdx) {
  const allExIds = day.sessions.flatMap(s => s.exercises.map(e => e.id));
  const doneCnt = allExIds.filter(id => state[id]).length;
  const dayDone = doneCnt === allExIds.length && allExIds.length > 0;
  const openClass = '';

  return `
    <div class="day-card${dayDone ? ' completed' : ''}${openClass}" id="card-${day.id}">
      <div class="day-header" onclick="toggleDay('${day.id}')">
        <span class="day-num">S${weekIdx+1} · D${dayIdx+1}</span>
        <span class="day-name">${day.dayName}</span>
        <div class="day-tags">${day.tags.map(tagHTML).join('')}</div>
        <span class="day-chevron">⌄</span>
      </div>
      <div class="day-content">
        ${day.sessions.map(sessionHTML).join('')}
        <button class="mark-day-btn" onclick="markDay('${day.id}', event)">
          ${dayDone ? '✓ Día completado' : '○ Marcar día como completado'}
        </button>
      </div>
    </div>`;
}

function weekHTML(week, idx) {
  const allExIds = week.days.flatMap(d => d.sessions.flatMap(s => s.exercises.map(e => e.id)));
  const doneCnt = allExIds.filter(id => state[id]).length;
  const pct = allExIds.length ? Math.round(doneCnt / allExIds.length * 100) : 0;

  return `
    <div class="week-block">
      <div class="week-header">
        <span class="week-title">${week.weekTitle}</span>
        <span class="week-tag">${week.weekTag}</span>
        <span class="week-progress-inline"><strong>${pct}%</strong> completado</span>
      </div>
      ${week.days.map((d, di) => dayHTML(d, idx, di)).join('')}
    </div>`;
}

function render() {
  document.getElementById('plan-container').innerHTML = PLAN.map((w, i) => weekHTML(w, i)).join('');
  updateStats();
}

// ============================================================
// INTERACCIÓN
// ============================================================
function toggleDay(dayId) {
  const card = document.getElementById('card-' + dayId);
  card.classList.toggle('open');
}

function toggleEx(exId) {
  state[exId] = !state[exId];
  saveState(state);

  const item = document.querySelector(`[data-exid="${exId}"]`);
  if (!item) return;
  item.classList.toggle('done', state[exId]);
  item.querySelector('.ex-check').textContent = state[exId] ? '✓' : '';

  // Update parent day card completion
  updateDayCard(item);
  updateStats();
  updateWeekProgress();
}

function updateDayCard(exItem) {
  const dayContent = exItem.closest('.day-content');
  if (!dayContent) return;
  const card = dayContent.closest('.day-card');
  const allItems = dayContent.querySelectorAll('.exercise-item');
  const doneItems = dayContent.querySelectorAll('.exercise-item.done');
  const allDone = allItems.length > 0 && allItems.length === doneItems.length;
  card.classList.toggle('completed', allDone);
  const btn = dayContent.querySelector('.mark-day-btn');
  if (btn) btn.textContent = allDone ? '✓ Día completado' : '○ Marcar día como completado';
}

function markDay(dayId, e) {
  e.stopPropagation();
  const week = PLAN.flatMap(w => w.days).find(d => d.id === dayId);
  if (!week) return;
  const allExIds = week.sessions.flatMap(s => s.exercises.map(ex => ex.id));
  const allDone = allExIds.every(id => state[id]);
  allExIds.forEach(id => { state[id] = !allDone; });
  saveState(state);
  render();
}

function updateStats() {
  const allExIds = PLAN.flatMap(w => w.days.flatMap(d => d.sessions.flatMap(s => s.exercises.map(e => e.id))));
  const allDays = PLAN.flatMap(w => w.days);
  const doneDays = allDays.filter(d => {
    const ids = d.sessions.flatMap(s => s.exercises.map(e => e.id));
    return ids.length > 0 && ids.every(id => state[id]);
  }).length;
  const doneEx = allExIds.filter(id => state[id]).length;
  const pct = allExIds.length ? Math.round(doneEx / allExIds.length * 100) : 0;

  document.getElementById('days-done').innerHTML = `${doneDays} <span>/ 28</span>`;
  document.getElementById('ex-done').innerHTML = `${doneEx} <span>/ <span id="ex-total">${allExIds.length}</span></span>`;
  document.getElementById('pct-done').innerHTML = `${pct}<span>%</span>`;
  document.getElementById('main-bar').style.width = pct + '%';
  document.getElementById('pct-label').textContent = pct + '%';
}

function updateWeekProgress() {
  PLAN.forEach((week, idx) => {
    const allExIds = week.days.flatMap(d => d.sessions.flatMap(s => s.exercises.map(e => e.id)));
    const doneCnt = allExIds.filter(id => state[id]).length;
    const pct = allExIds.length ? Math.round(doneCnt / allExIds.length * 100) : 0;
    const el = document.querySelector(`.week-block:nth-child(${idx+1}) .week-progress-inline strong`);
    if (el) el.textContent = pct + '%';
  });
}

function resetAll() {
  if (!confirm('¿Reiniciar todo el progreso? Esta acción no se puede deshacer.')) return;
  state = {};
  saveState(state);
  render();
}

// Init
render();
</script>
